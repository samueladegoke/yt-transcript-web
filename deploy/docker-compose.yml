# Docker Compose Configuration for YT Transcript
# Production deployment with nginx reverse proxy

services:
  # Nginx Reverse Proxy with Security Headers
  nginx:
    image: nginx:1.25-alpine
    container_name: yt-web-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend/dist:/var/www/yt-web/dist:ro
      - /etc/ssl/certs:/etc/ssl/certs:ro
      - /etc/ssl/private:/etc/ssl/private:ro
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - yt-web-network
    # Uncomment for SSL certificate management with Let's Encrypt
    # volumes:
    #   - ./nginx.conf:/etc/nginx/nginx.conf:ro
    #   - ../frontend/dist:/var/www/yt-web/dist:ro
    #   - ./letsencrypt:/etc/letsencrypt:ro
    #   - ./nginx.conf.d:/etc/nginx/conf.d:ro

  # FastAPI Backend
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: yt-web-backend
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - LOG_LEVEL=info
    expose:
      - "8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - yt-web-network
    # Optional: mount volume for logs
    # volumes:
    #   - ./logs:/home/azureuser/.openclaw/workspace/yt-web/backend/logs

networks:
  yt-web-network:
    driver: bridge
    name: yt-web-network

# ===================================================================
# SSL/TLS Setup with Let's Encrypt (Production)
# ===================================================================
# 
# For production with Let's Encrypt:
#
# 1. Create acme.json for certbot:
#    mkdir -p letsencrypt
#    chmod 600 letsencrypt/acme.json
#
# 2. Add certbot service:
#   certbot:
#     image: certbot/certbot:latest
#     container_name: yt-web-certbot
#     volumes:
#       - ./letsencrypt:/etc/letsencrypt
#       - ./nginx.conf.d:/etc/nginx/conf.d
#     command: certonly --webroot -w /var/www/html -d yourdomain.com --agree-tos --email your@email.com
#     restart: on-failure
#
# 3. Update nginx.conf with Let's Encrypt paths:
#    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
#    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
#
# 4. Set up automatic renewal in crontab:
#    0 */12 * * * docker-compose run --rm certbot renew --quiet
