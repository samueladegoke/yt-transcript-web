# Nginx Reverse Proxy Configuration for YT Transcript
# Security Headers enabled for production deployment

# Run as non-root user (configure based on your system)
user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging Settings
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/rss+xml application/atom+xml image/svg+xml;
    gzip_disable "msie6";

    # ===================================================================
    # SECURITY HEADERS - Production Required
    # ===================================================================
    
    # HSTS - Force HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Prevent clickjacking - deny framing from any source
    add_header X-Frame-Options "DENY" always;
    
    # Content Security Policy - restrict to self
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:; font-src 'self' data:; frame-ancestors 'none';" always;
    
    # Referrer Policy - strict origin when cross-origin
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # XSS Protection
    add_header X-XSS-Protection "1; mode=block" always;

    # Additional Security Headers
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ===================================================================
    # UPSTREAM - Backend FastAPI Server
    # ===================================================================
    upstream yt_backend {
        server 127.0.0.1:8001;
        keepalive 32;
    }

    # ===================================================================
    # HTTP Server (Redirect to HTTPS)
    # ===================================================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Security: HSTS preload (uncomment after testing)
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Redirect all HTTP to HTTPS
        return 301 https://$host$request_uri;
    }

    # ===================================================================
    # HTTPS Server (Production)
    # ===================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;

        # SSL Configuration (Production: replace with Let's Encrypt certs)
        # Using self-signed for development - replace paths for production
        ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
        ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
        
        # SSL Security Settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5:!SEED:!IDEA;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # OCSP Stapling (for Let's Encrypt)
        # ssl_stapling on;
        # ssl_stapling_verify on;
        # resolver 8.8.8.8 8.8.4.4 valid=300s;
        # resolver_timeout 5s;

        # Security: Disable weak ciphers
        # ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';

        # ===================================================================
        # Static Files (Frontend)
        # ===================================================================
        root /var/www/yt-web/dist;
        index index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Frontend SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ===================================================================
        # API Proxy (Backend FastAPI)
        # ===================================================================
        location /api/ {
            proxy_pass http://yt_backend/;
            
            # Proxy headers
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Connection upgrades
            proxy_set_header Connection "";
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            # CORS headers (if needed)
            # add_header Access-Control-Allow-Origin "*" always;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://yt_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Rate limiting (optional - adjust as needed)
        # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
        # location /api/ {
        #     limit_req zone=api_limit burst=20 nodelay;
        # }
    }
}
